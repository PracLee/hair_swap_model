name: Build and Push SD App Image

on:
  push:
    branches:
      - main
      - master
    paths:
      - "Dockerfile.sd.app"
      - "entrypoint_sd.sh"
      - "handler_sd.py"
      - "pipeline_sd_inpainting.py"
      - "runtime_download.py"
      - "utils/sam2_runtime.py"
      - "models/__init__.py"
      - "models/face_parsing/**"
      - "models/segface/**"
      - "pretrained_models/seg.pth"
      - "data/**"
      - ".dockerignore"
      - ".github/workflows/build-sd-app.yml"
  workflow_dispatch:
    inputs:
      version:
        description: "원하는 버전 태그 (예: v8, v9). 미입력 시 자동번호 사용"
        required: false
        default: ""
        type: string
      base_image:
        description: "선택: BASE_IMAGE override (예: username/sd:base-v8)"
        required: false
        default: ""
        type: string

concurrency:
  group: build-sd-app-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: [self-hosted, linux, x64, runpod, sd-builder]
    timeout-minutes: 180
    env:
      DOCKER_BUILDKIT: "0"
      COMPOSE_DOCKER_CLI_BUILD: "0"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Docker preflight
        run: |
          docker version
          docker info

      - name: Log in to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Resolve build metadata
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="v${{ github.run_number }}"
          fi
          if [[ "${VERSION}" != v* ]]; then
            VERSION="v${VERSION}"
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.base_image }}" ]; then
            BASE_IMAGE="${{ github.event.inputs.base_image }}"
          else
            BASE_IMAGE="${{ secrets.DOCKER_USERNAME }}/sd:base-latest"
          fi

          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "BASE_IMAGE=${BASE_IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Check base image existence
        id: base_exists
        shell: bash
        run: |
          if docker manifest inspect "${{ steps.meta.outputs.BASE_IMAGE }}" >/dev/null 2>&1; then
            echo "value=true" >> "$GITHUB_OUTPUT"
            echo "[build-sd-app] base image found: ${{ steps.meta.outputs.BASE_IMAGE }}"
          else
            echo "value=false" >> "$GITHUB_OUTPUT"
            echo "[build-sd-app] base image missing: ${{ steps.meta.outputs.BASE_IMAGE }}"
          fi

      - name: Bootstrap base image when missing
        if: steps.base_exists.outputs.value == 'false'
        run: |
          docker build -f Dockerfile.sd.base \
            -t "${{ steps.meta.outputs.BASE_IMAGE }}" \
            -t "${{ secrets.DOCKER_USERNAME }}/sd:base-latest" .
          docker push "${{ steps.meta.outputs.BASE_IMAGE }}"
          docker push "${{ secrets.DOCKER_USERNAME }}/sd:base-latest"

      - name: Build and push SD app image
        run: |
          APP_TAG="${{ secrets.DOCKER_USERNAME }}/sd:${{ steps.meta.outputs.VERSION }}"
          LATEST_TAG="${{ secrets.DOCKER_USERNAME }}/sd:latest"
          docker build -f Dockerfile.sd.app \
            --build-arg BASE_IMAGE="${{ steps.meta.outputs.BASE_IMAGE }}" \
            -t "${APP_TAG}" -t "${LATEST_TAG}" .
          docker push "${APP_TAG}"
          docker push "${LATEST_TAG}"
