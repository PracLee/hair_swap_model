name: Build and Push SD App Image

on:
  push:
    branches:
      - main
      - master
    paths:
      - "Dockerfile.sd.app"
      - "entrypoint_sd.sh"
      - "handler_sd.py"
      - "pipeline_sd_inpainting.py"
      - "runtime_download.py"
      - "utils/sam2_runtime.py"
      - "models/__init__.py"
      - "models/face_parsing/**"
      - "models/segface/**"
      - "pretrained_models/seg.pth"
      - "data/**"
      - ".dockerignore"
      - ".github/workflows/build-sd-app.yml"
  workflow_dispatch:
    inputs:
      version:
        description: "원하는 버전 태그 (예: v8, v9). 미입력 시 자동번호 사용"
        required: false
        default: ""
        type: string
      base_image:
        description: "선택: BASE_IMAGE override (예: username/sd:base-v8)"
        required: false
        default: ""
        type: string

concurrency:
  group: build-sd-app-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: [self-hosted, linux, x64, runpod, sd-builder]
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Docker preflight
        run: |
          docker version
          docker info
          docker buildx version

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Resolve build metadata
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="v${{ github.run_number }}"
          fi
          if [[ "${VERSION}" != v* ]]; then
            VERSION="v${VERSION}"
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.base_image }}" ]; then
            BASE_IMAGE="${{ github.event.inputs.base_image }}"
          else
            BASE_IMAGE="${{ secrets.DOCKER_USERNAME }}/sd:base-latest"
          fi

          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "BASE_IMAGE=${BASE_IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Check base image existence
        id: base_exists
        shell: bash
        run: |
          if docker buildx imagetools inspect "${{ steps.meta.outputs.BASE_IMAGE }}" >/dev/null 2>&1; then
            echo "value=true" >> "$GITHUB_OUTPUT"
            echo "[build-sd-app] base image found: ${{ steps.meta.outputs.BASE_IMAGE }}"
          else
            echo "value=false" >> "$GITHUB_OUTPUT"
            echo "[build-sd-app] base image missing: ${{ steps.meta.outputs.BASE_IMAGE }}"
          fi

      - name: Bootstrap base image when missing
        if: steps.base_exists.outputs.value == 'false'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.sd.base
          platforms: linux/amd64
          push: true
          provenance: false
          tags: |
            ${{ steps.meta.outputs.BASE_IMAGE }}
            ${{ secrets.DOCKER_USERNAME }}/sd:base-latest
          cache-from: |
            type=registry,ref=${{ secrets.DOCKER_USERNAME }}/sd:buildcache-base
            type=gha,scope=sd-base
          cache-to: |
            type=registry,ref=${{ secrets.DOCKER_USERNAME }}/sd:buildcache-base,mode=max
            type=gha,mode=max,scope=sd-base

      - name: Build and push SD app image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.sd.app
          build-args: |
            BASE_IMAGE=${{ steps.meta.outputs.BASE_IMAGE }}
          platforms: linux/amd64
          pull: true
          push: true
          provenance: false
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/sd:${{ steps.meta.outputs.VERSION }}
            ${{ secrets.DOCKER_USERNAME }}/sd:latest
          cache-from: |
            type=registry,ref=${{ secrets.DOCKER_USERNAME }}/sd:buildcache
            type=gha,scope=sd-app
          cache-to: |
            type=registry,ref=${{ secrets.DOCKER_USERNAME }}/sd:buildcache,mode=max
            type=gha,mode=max,scope=sd-app
