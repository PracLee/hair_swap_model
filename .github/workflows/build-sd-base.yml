name: Build and Push SD Base Image

on:
  push:
    branches:
      - main
      - master
    paths:
      - "Dockerfile.sd.base"
      - "requirements-sd.txt"
      - ".dockerignore"
      - ".github/workflows/build-sd-base.yml"
  workflow_dispatch:
    inputs:
      version:
        description: "원하는 버전 태그 (예: v8, v9). 미입력 시 자동번호 사용"
        required: false
        default: ""
        type: string

concurrency:
  group: build-sd-base-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Resolve version
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="v${{ github.run_number }}"
          fi
          if [[ "${VERSION}" != v* ]]; then
            VERSION="v${VERSION}"
          fi
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build and push SD base image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.sd.base
          platforms: linux/amd64
          push: true
          provenance: false
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/sd:base-${{ steps.meta.outputs.VERSION }}
            ${{ secrets.DOCKER_USERNAME }}/sd:base-latest
          cache-from: |
            type=registry,ref=${{ secrets.DOCKER_USERNAME }}/sd:buildcache-base
            type=gha,scope=sd-base
          cache-to: |
            type=registry,ref=${{ secrets.DOCKER_USERNAME }}/sd:buildcache-base,mode=max
            type=gha,mode=max,scope=sd-base

