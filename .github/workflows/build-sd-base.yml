name: Build and Push SD Base Image

on:
  push:
    branches:
      - main
      - master
    paths:
      - "Dockerfile.sd.base"
      - "requirements-sd.txt"
      - ".dockerignore"
      - ".github/workflows/build-sd-base.yml"
  workflow_dispatch:
    inputs:
      version:
        description: "원하는 버전 태그 (예: v8, v9). 미입력 시 자동번호 사용"
        required: false
        default: ""
        type: string

concurrency:
  group: build-sd-base-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: [self-hosted, linux, x64, runpod, sd-builder]
    timeout-minutes: 180
    env:
      DOCKER_BUILDKIT: "0"
      COMPOSE_DOCKER_CLI_BUILD: "0"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Docker preflight
        run: |
          docker version
          docker info

      - name: Log in to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Resolve version
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="v${{ github.run_number }}"
          fi
          if [[ "${VERSION}" != v* ]]; then
            VERSION="v${VERSION}"
          fi
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build and push SD base image
        run: |
          BASE_TAG="${{ secrets.DOCKER_USERNAME }}/sd:base-${{ steps.meta.outputs.VERSION }}"
          LATEST_TAG="${{ secrets.DOCKER_USERNAME }}/sd:base-latest"
          docker build -f Dockerfile.sd.base -t "${BASE_TAG}" -t "${LATEST_TAG}" .
          docker push "${BASE_TAG}"
          docker push "${LATEST_TAG}"
