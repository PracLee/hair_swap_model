name: Build and Push SD Image

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'Dockerfile.sd'
      - 'requirements-sd.txt'
      - 'entrypoint_sd.sh'
      - 'pipeline_sd_inpainting.py'
      - 'pipeline_optimized.py'
      - 'utils/**'
      - 'models/**'
  workflow_dispatch: # GitHub 웹사이트에서 수동 실행 버튼 활성화
    inputs:
      version:
        description: '원하는 버전 태그를 입력하세요 (예: v8, v9) - 미입력시 자동번호 부여'
        required: false
        default: ''
        type: string

# 같은 브랜치에 새 커밋이 오면 진행 중인 빌드 자동 취소
concurrency:
  group: build-sd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 용량 확보 (ML 이미지 빌드 시 디스크 부족 에러 방지)
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Generate Version Tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.version }}" ]; then
            echo "TAG=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            # 자동 푸시이거나 버전을 입력하지 않은 경우 실행번호를 v1, v2... 형태로 사용
            echo "TAG=v${{ github.run_number }}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push SD Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.sd
          platforms: linux/amd64
          push: true
          # 지정된 버전 토큰과 최신(latest) 태그를 둘 다 할당
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/sd:${{ steps.version.outputs.TAG }}
            ${{ secrets.DOCKER_USERNAME }}/sd:latest
          # 빌드 속도 개선을 위해 캐시 지정
          cache-from: type=gha
          cache-to: type=gha,mode=max
