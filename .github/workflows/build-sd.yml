name: Build and Push SD Image

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'Dockerfile.sd'
      - 'requirements-sd.txt'
      - '**.py'
      - '**.sh'
  workflow_dispatch: # GitHub 웹사이트에서 수동 실행 버튼 활성화

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 용량 확보 (ML 이미지 빌드 시 디스크 부족 에러 방지)
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push SD Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.sd
          platforms: linux/amd64
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/sd-v1:latest
          # 빌드 속도 개선을 위해 캐시 지정
          cache-from: type=gha
          cache-to: type=gha,mode=max
